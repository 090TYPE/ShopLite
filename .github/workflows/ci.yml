name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ShopLite.sln

      - name: Build
        run: dotnet build ShopLite.sln --configuration Release --no-restore

      - name: Unit tests
        run: |
          dotnet test tests/UserService.UnitTests --configuration Release --no-build --verbosity normal
          dotnet test tests/OrderService.UnitTests --configuration Release --no-build --verbosity normal

      - name: Integration tests (Testcontainers)
        run: |
          dotnet test tests/UserService.IntegrationTests --configuration Release --no-build --verbosity normal
          dotnet test tests/OrderService.IntegrationTests --configuration Release --no-build --verbosity normal

      - name: E2E tests (real RabbitMQ broker)
        run: dotnet test tests/ShopLite.E2ETests --configuration Release --no-build --verbosity normal
